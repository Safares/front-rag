<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Builder</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>RAG Builder</h1>
      <p>Crie uma base de conhecimento com OpenAI ou Gemini</p>
    </header>

    <!-- CONFIGURAÇÃO -->
    <section class="card" id="config-panel">
      <h2>1. Provedor</h2>
      <div class="ai-selector">
        <label class="ai-option" id="opt-openai">
          <input type="radio" name="ai_type" value="openai" checked />
          <span class="ai-icon">&#x1F916;</span>
          <span>OpenAI GPT</span>
        </label>
        <label class="ai-option" id="opt-gemini">
          <input type="radio" name="ai_type" value="gemini" />
          <span class="ai-icon">&#x2728;</span>
          <span>Google Gemini</span>
        </label>
      </div>

      <div class="field">
        <label for="api_key">API Key / Token</label>
        <input type="password" id="api_key" placeholder="Cole sua chave aqui..." autocomplete="off" />
      </div>

      <!-- ABAS -->
      <div class="tabs" style="margin-top:24px">
        <button class="tab-btn active" id="tab-file-btn" data-tab="file">Arquivo</button>
        <button class="tab-btn" id="tab-url-btn" data-tab="url">URL / Site</button>
      </div>

      <!-- ABA ARQUIVO -->
      <div id="tab-file" class="tab-content">
        <div class="drop-zone" id="drop-zone">
          <div class="drop-icon">&#x1F4C2;</div>
          <p>Arraste os arquivos aqui ou <span class="link">clique para selecionar</span></p>
          <small>Suporta: .txt, .md, .pdf, .xlsx, .xls &middot; Múltiplos permitidos</small>
          <input type="file" id="file-input" accept=".txt,.md,.pdf,.xlsx,.xls" multiple hidden />
        </div>
        <div id="file-list" class="file-list hidden"></div>
        <button class="btn-primary" id="upload-btn" disabled>Criar RAG</button>
      </div>

      <!-- ABA URL -->
      <div id="tab-url" class="tab-content hidden">
        <div class="field">
          <label for="url-input">URL da página ou base de documentação</label>
          <input type="url" id="url-input" placeholder="https://docs.exemplo.com/..." />
        </div>
        <div class="depth-row">
          <span class="depth-label">Profundidade:</span>
          <div class="depth-options">
            <label class="depth-opt"><input type="radio" name="depth" value="1" /> 1 nível</label>
            <label class="depth-opt"><input type="radio" name="depth" value="2" checked /> 2 níveis</label>
            <label class="depth-opt"><input type="radio" name="depth" value="3" /> 3 níveis</label>
            <label class="depth-opt"><input type="radio" name="depth" value="0" /> Sem limite</label>
          </div>
        </div>
        <label class="js-toggle">
          <input type="checkbox" id="use-js" />
          <span class="js-toggle-label">
            <strong>Renderização JavaScript</strong>
            <small>Para sites dinâmicos (ex: Zoho Desk, Confluence, SPAs). Mais lento.</small>
          </span>
        </label>
        <button class="btn-primary" id="scan-btn" disabled>Escanear páginas</button>

        <!-- LISTA DE CONFIRMAÇÃO -->
        <div id="pages-panel" class="pages-panel hidden">
          <div class="pages-header">
            <span id="pages-count"></span>
            <div class="pages-actions">
              <button class="btn-text" id="select-all-btn">Selecionar tudo</button>
              <button class="btn-text" id="deselect-all-btn">Desmarcar tudo</button>
            </div>
          </div>
          <div id="pages-list" class="pages-list"></div>
          <button class="btn-primary" id="scrape-btn">Criar RAG com páginas selecionadas</button>
        </div>
      </div>

      <div id="progress-log" class="progress-log hidden"></div>
      <div id="upload-status" class="status hidden"></div>
    </section>

    <!-- RESULTADO -->
    <section class="card result-card hidden" id="result-panel">
      <div class="result-header">RAG criado com sucesso!</div>
      <div class="result-fields">
        <div class="result-field">
          <span class="result-label">Fonte</span>
          <span class="result-value" id="r-filename"></span>
        </div>
        <div class="result-field">
          <span class="result-label">Provedor</span>
          <span class="result-value" id="r-provider"></span>
        </div>
        <div class="result-field">
          <span class="result-label">Store ID</span>
          <code class="result-code" id="r-store-id"></code>
        </div>
        <div class="result-field">
          <span class="result-label">Salvo em</span>
          <span class="result-value" id="r-saved"></span>
        </div>
      </div>
      <button class="btn-copy" id="copy-btn">Copiar Store ID</button>
    </section>

    <!-- CHAT -->
    <section class="card hidden" id="chat-panel">
      <h2>Chat com o documento</h2>
      <div class="chat-box" id="chat-box"></div>
      <div class="chat-input-row">
        <input type="text" id="question-input" placeholder="Faça uma pergunta sobre o documento..." />
        <button class="btn-send" id="send-btn">Enviar</button>
      </div>
    </section>
  </div>

  <script src="/script.js"></script>
</body>
</html>
